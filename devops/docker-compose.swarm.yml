version: "3.9"

services:
  # PostgreSQL Primary node
  pg-primary:
    image: ${PG_IMAGE:-timescale/timescaledb:2.25.2-pg18}
    environment:
      POSTGRES_USER: ${PG_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-postgres123}
      POSTGRES_DB: ${PG_DEFAULT_DB:-postgres}
      REPLICATION_USER: ${PG_REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${PG_REPLICATION_PASSWORD:-replicator123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
    configs:
      - source: pg_init_replication
        target: /docker-entrypoint-initdb.d/pg_init_replication.sh
    networks:
      - pgcluster_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      placement:
        constraints:
          - node.hostname == server-b
      resources:
        limits:
          memory: ${PG_MEMORY_LIMIT:-8G}
        reservations:
          memory: ${PG_MEMORY:-4G}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ADMIN_USER:-postgres} -d ${PG_DEFAULT_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Standby node 1
  pg-standby1:
    image: ${PG_IMAGE:-timescale/timescaledb:2.25.2-pg18}
    environment:
      POSTGRES_USER: ${PG_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg-standby1-data:/var/lib/postgresql/data
    networks:
      - pgcluster_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      placement:
        constraints:
          - node.hostname == server-c
      resources:
        limits:
          memory: ${PG_MEMORY_LIMIT:-8G}
        reservations:
          memory: ${PG_MEMORY:-4G}
    depends_on:
      - pg-primary
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ADMIN_USER:-postgres} -d ${PG_DEFAULT_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL Standby node 2
  pg-standby2:
    image: ${PG_IMAGE:-timescale/timescaledb:2.25.2-pg18}
    environment:
      POSTGRES_USER: ${PG_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_ADMIN_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg-standby2-data:/var/lib/postgresql/data
    networks:
      - pgcluster_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      placement:
        constraints:
          - node.hostname == server-d
      resources:
        limits:
          memory: ${PG_MEMORY_LIMIT:-8G}
        reservations:
          memory: ${PG_MEMORY:-4G}
    depends_on:
      - pg-primary
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ADMIN_USER:-postgres} -d ${PG_DEFAULT_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL initialization service (runs once to enable TimescaleDB)
  pg-init:
    image: ${PG_IMAGE:-timescale/timescaledb:2.25.2-pg18}
    environment:
      PGHOST: pg-primary
      PGUSER: ${PG_ADMIN_USER:-postgres}
      PGPASSWORD: ${PG_ADMIN_PASSWORD:-postgres123}
      PGDATABASE: ${PG_DEFAULT_DB:-postgres}
    networks:
      - pgcluster_internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      placement:
        constraints:
          - node.hostname == server-b
    command: >
      bash -c "
      until pg_isready -h pg-primary -U ${PG_ADMIN_USER:-postgres}; do
        echo 'Waiting for PostgreSQL primary...';
        sleep 2;
      done;
      psql -h pg-primary -U ${PG_ADMIN_USER:-postgres} -d ${PG_DEFAULT_DB:-postgres} -c 'CREATE EXTENSION IF NOT EXISTS timescaledb;'
      "
    depends_on:
      - pg-primary

volumes:
  pg-primary-data:
    driver: local
  pg-standby1-data:
    driver: local
  pg-standby2-data:
    driver: local

networks:
  pgcluster_internal:
    driver: overlay
    attachable: true

configs:
  pg_init_replication:
    external: true
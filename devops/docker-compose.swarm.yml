version: "3.9"

services:
  minecraft:
    image: itzg/minecraft-server:java21
    environment:
      # --- Serveur ---
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: ${MC_VERSION:-LATEST}
      MEMORY: ${MC_MEMORY:-4G}
      MAX_PLAYERS: ${MC_MAX_PLAYERS:-20}
      MOTD: ${MC_MOTD:-§6Bienvenue sur le serveur Minecraft !}
      DIFFICULTY: ${MC_DIFFICULTY:-normal}
      MODE: ${MC_GAMEMODE:-survival}
      LEVEL_TYPE: ${MC_LEVEL_TYPE:-DEFAULT}
      SEED: ${MC_SEED:-}
      VIEW_DISTANCE: ${MC_VIEW_DISTANCE:-12}
      SIMULATION_DISTANCE: ${MC_SIMULATION_DISTANCE:-8}
      SERVER_NAME: ${MC_SERVER_NAME:-MinecraftServer}

      # --- Sécurité ---
      ONLINE_MODE: "TRUE"
      ENABLE_WHITELIST: "TRUE"
      ENFORCE_WHITELIST: "TRUE"
      ENABLE_COMMAND_BLOCK: "FALSE"
      SPAWN_PROTECTION: ${MC_SPAWN_PROTECTION:-16}
      MAX_TICK_TIME: "60000"
      PREVENT_PROXY_CONNECTIONS: "TRUE"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD:?RCON_PASSWORD requis}
      RCON_PORT: "25575"
      SNOOPER_ENABLED: "FALSE"
      ENABLE_QUERY: "FALSE"

      # --- Réseau ---
      SERVER_PORT: "25565"

      # --- Geyser + Floodgate (compatibilité Bedrock) ---
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot

      # --- BlueMap (via Modrinth, plus fiable que les URLs GitHub) ---
      MODRINTH_PROJECTS: bluemap

      # Copier les configs BlueMap (accept-download, webserver) avant le démarrage
      COPY_CONFIG_SRC: /bluemap-config
      COPY_CONFIG_DEST: /data/plugins/BlueMap

      # --- Performance PaperMC ---
      USE_AIKAR_FLAGS: "TRUE"
      ENABLE_ROLLING_LOGS: "TRUE"
      TZ: ${TZ:-Europe/Paris}

    volumes:
      - minecraft-data:/data

    configs:
      - source: bluemap_core_conf
        target: /bluemap-config/core.conf
      - source: bluemap_webserver_conf
        target: /bluemap-config/webserver.conf

    networks:
      - proxy
      - minecraft-net

    stdin_open: true
    tty: true

    healthcheck:
      test: mc-health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      placement:
        constraints:
          - node.hostname == server-c
      resources:
        limits:
          memory: ${MC_MEMORY_LIMIT:-6G}
        reservations:
          memory: ${MC_MEMORY:-4G}
      labels:
        - "traefik.enable=true"

        # --- Routage TCP : Minecraft Java Edition (port 25565) ---
        - "traefik.tcp.routers.minecraft-java.rule=HostSNI(`*`)"
        - "traefik.tcp.routers.minecraft-java.entrypoints=minecraft-java"
        - "traefik.tcp.routers.minecraft-java.service=minecraft-java"
        - "traefik.tcp.services.minecraft-java.loadbalancer.server.port=25565"

        # --- Routage UDP : Minecraft Bedrock Edition (port 19132) ---
        - "traefik.udp.routers.minecraft-bedrock.entrypoints=minecraft-bedrock"
        - "traefik.udp.routers.minecraft-bedrock.service=minecraft-bedrock"
        - "traefik.udp.services.minecraft-bedrock.loadbalancer.server.port=19132"

        # --- Traefik HTTP : carte web BlueMap ---
        # Service BlueMap
        - "traefik.http.services.minecraft-map.loadbalancer.server.port=${BLUEMAP_PORT:-8100}"

        # Router HTTPS - Carte web
        - "traefik.http.routers.minecraft-map.rule=Host(`${MAP_DOMAIN:-map.minecraft.vinsot.fr}`)"
        - "traefik.http.routers.minecraft-map.entrypoints=websecure"
        - "traefik.http.routers.minecraft-map.tls.certresolver=letsencrypt"
        - "traefik.http.routers.minecraft-map.middlewares=global@file"
        - "traefik.http.routers.minecraft-map.service=minecraft-map"

        # Router HTTP - Redirection vers HTTPS
        - "traefik.http.routers.minecraft-map-http.rule=Host(`${MAP_DOMAIN:-map.minecraft.vinsot.fr}`)"
        - "traefik.http.routers.minecraft-map-http.entrypoints=web"
        - "traefik.http.routers.minecraft-map-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.minecraft-map-http.service=noop@internal"

  # --- Interface web whitelist (accès local uniquement) ---
  whitelist-web:
    image: registry.methodinfo.fr/minecraft-whitelist-web:latest
    build:
      context: ..
      dockerfile: whitelist-web/Dockerfile
    environment:
      RCON_HOST: minecraft
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD:?RCON_PASSWORD requis}
      HTTP_PORT: "8080"

    networks:
      - proxy
      - minecraft-net

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
      placement:
        constraints:
          - node.hostname == server-c
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
      labels:
        - "traefik.enable=true"

        # Service
        - "traefik.http.services.minecraft-whitelist.loadbalancer.server.port=8080"

        # Router HTTPS — accès réseau local uniquement (dashboard-allowlist)
        - "traefik.http.routers.minecraft-whitelist.rule=Host(`${WHITELIST_DOMAIN:-whitelist.minecraft.vinsot.fr}`)"
        - "traefik.http.routers.minecraft-whitelist.entrypoints=websecure"
        - "traefik.http.routers.minecraft-whitelist.tls.certresolver=letsencrypt"
        - "traefik.http.routers.minecraft-whitelist.middlewares=dashboard-allowlist@file"
        - "traefik.http.routers.minecraft-whitelist.service=minecraft-whitelist"

        # Router HTTP — redirection vers HTTPS
        - "traefik.http.routers.minecraft-whitelist-http.rule=Host(`${WHITELIST_DOMAIN:-whitelist.minecraft.vinsot.fr}`)"
        - "traefik.http.routers.minecraft-whitelist-http.entrypoints=web"
        - "traefik.http.routers.minecraft-whitelist-http.middlewares=redirect-to-https@file"
        - "traefik.http.routers.minecraft-whitelist-http.service=noop@internal"

  # --- Sauvegarde automatique ---
  backup:
    image: itzg/mc-backup:latest
    environment:
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-24h}
      RCON_HOST: minecraft
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD:?RCON_PASSWORD requis}
      PAUSE_IF_NO_PLAYERS: "true"
      PLAYERS_ONLINE_CHECK_INTERVAL: "5m"
      PRUNE_BACKUPS_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_METHOD: tar
      DEST_DIR: /backups
      SRC_DIR: /data/world
      TZ: ${TZ:-Europe/Paris}

    volumes:
      - minecraft-data:/data:ro
      - minecraft-backups:/backups

    networks:
      - proxy
      - minecraft-net

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
      placement:
        constraints:
          - node.hostname == server-c

volumes:
  minecraft-data:
    driver: local
  minecraft-backups:
    driver: local

networks:
  proxy:
    external: true
  minecraft-net:
    driver: overlay
    attachable: true

configs:
  bluemap_core_conf:
    file: ./bluemap/core.conf
  bluemap_webserver_conf:
    file: ./bluemap/webserver.conf